name: Feature request
description: Suggest a narrowly scoped MCP or D2 integration improvement.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What diagram workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the MCP client be able to do?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety boundary
      description: Does this require reading files, fetching remote assets, writing outside the workdir, or exposing additional D2 flags?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
